<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <style>
        .active-tab {
            background-color: #4A00FF !important;
            color: white !important;
        }
    </style>
</head>

<body class="bg-gray-50">
    <nav
        class="bg-white border-b border-gray-200 py-4  px-6 lg:px-20 flex flex-wrap  justify-between items-center sticky top-0 z-50 gap-4">
        <div class="flex items-center gap-3">
            <img src="./assets/github-logo.png" alt="logo" class="w-8  h-8">
            <span class="font-bold text-lg md:text-xl text-[#1E293B ]">GitHub Issues Tracker</span>
        </div>

        <div class=" flex items-center gap-3 w-full  md:w-auto ">
            <div class="relative flex-grow">
                <img src="./assets/MagnifyingGlass.png"
                    class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 opacity-50" alt="search">
                <input type="text" id="search-input" onkeyup="handleSearch()" placeholder="Search issues..."
                    class="border p-2 rounded outline-none w-full md:w-64 pl-10 bg-gray-50">
            </div>
            <button class="bg-[#4A00FF] text-white  px-4 py-2  rounded font-medium  whitespace-nowrap">+ New
                Issue</button>
        </div>
    </nav>

    <main class="max-w-7xl  mx-auto mt-6 md:mt-10 p-4 lg:px-20">
        <div class="bg-white border border-gray-100 rounded-xl  shadow-sm p-4 md:p-6 mb-4">
            <div class="flex gap-2 overflow-x-auto">
                <button onclick="filterData('all')" id="btn-all"
                    class="active-tab min-w-[80px] md:w-[100px] py-2 rounded-lg border border-gray-200 font-medium">All</button>
                <button onclick="filterData('open')" id="btn-open"
                    class="min-w-[80px] md:w-[100px] py-2 rounded-lg border border-gray-200 text-gray-700 font-medium">Open</button>
                <button onclick="filterData('closed')" id="btn-closed"
                    class="min-w-[80px] md:w-[100px] py-2 rounded-lg border border-gray-200 text-gray-700 font-medium">Closed</button>
            </div>
        </div>

        <div class="bg-white border border-gray-100 rounded-t-xl shadow-sm p-4 md:p-6 mb-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-[#F3E8FF] rounded-full flex items-center justify-center shrink-0">
                        <img src="./assets/Aperture.png" alt="Icon" class="w-6 h-6">
                    </div>
                    <div>
                        <h1 id="issue-count" class="text-xl md:text-2xl font-bold text-gray-800">0 Issues</h1>
                        <p class="text-gray-500 text-sm">Track and manage project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-[#10B981] rounded-full"></span>
                        <span class="text-gray-700 font-bold text-sm">Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-[#8B5CF6] rounded-full"></span>
                        <span class="text-gray-700 font-bold text-sm">Closed</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="loader" class="text-center py-10 text-[#4A00FF] font-bold hidden">Loading... </div>

        <div id="cards-container"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4  gap-6 p-4 md:p-6 bg-[#FBFBFB] border  border-gray-150 rounded-b-xl  shadow-sm -mt-6">
        </div>

        <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
            <div id="modal-content" class="w-full max-w-2xl bg-white rounded-2xl relative">
            </div>
        </div>
    </main>

    <script>
        let allIssues = [];

        // data load
        async function fetchInitialData() {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            try {
                let res = await fetch('https://phi-lab-server.vercel.app/api/v1/lab/issues');
                let data = await res.json();

                if (data.data) {
                    allIssues = data.data;
                } else {
                    allIssues = data;
                }

                renderCards(allIssues);

            } catch (e) {
                console.log(e);
            }

            loader.classList.add('hidden');
        }

        // show cards
        function renderCards(list) {
            const container = document.getElementById('cards-container');
            const countText = document.getElementById('issue-count');

            container.innerHTML = "";
            countText.innerText = list.length + " Issues";

            for (let i = 0; i < list.length; i++) {

                let item = list[i];

                let status = (item.status || 'open').toLowerCase();
                let priority = (item.priority || 'low').toLowerCase();

                let borderColor = status === 'open'
                    ? 'border-t-[#10B981]'
                    : 'border-t-[#8B5CF6]';

                let statusIcon = status === 'open'
                    ? './assets/Open-Status.png'
                    : './assets/Closed-Status.png';

                let pStyle = "bg-gray-100 text-gray-500";
                if (priority === 'high') {
                    pStyle = "bg-red-100 text-red-500";
                } else if (priority === 'medium') {
                    pStyle = "bg-yellow-100 text-yellow-600";
                }

                let title = item.title || "No title";
                let desc = item.description || "No description";

                let card = document.createElement('div');

                card.className = `bg-white border border-gray-200 ${borderColor}  border-t-4 rounded-xl p-5  shadow-sm hover:shadow-md cursor-pointer  flex flex-col min-h-[260px]  transition-all`;

                card.innerHTML = `
                <div class="flex  justify-between  items-start mb-3">
                    <img src="${statusIcon}"class="w-5 h-5">
                     <span  class="px-2 py-0.5 ${pStyle} text-[10px] font-bold  rounded uppercase">${priority}</span>
                </div>
                <h3 class="font-bold  text-[14px] text-gray-800  mb-2 line-clamp-2">${title}</h3>
            <p class="text-gray-400 text-[11px]  line-clamp-2 mb-4">${desc}</p>
                <div class="flex  gap-2 mb-4">
                    <img src="./assets/Bug_Labels.png"  class="h-5">
                    <img src="./assets/Help_Labels.png" class="h-5">
            </div>
                <div class="mt-auto  pt-3 border-t">
                    <p class="text-gray-500 text-[10px]  font-medium">#${item.id}  by ${item.author}</p>
                    <p class="text-gray-400 text-[10px]  mt-0.5">${item.date || '22/02/2026'}</p>
                 </div>
            `;

                card.onclick = function () {
                    openModal(item.id);
                };

                container.appendChild(card);
            }
        }

        // filter
        function filterData(type) {
            let buttons = document.querySelectorAll('button[id^="btn-"]');

            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active-tab');
            }

            document.getElementById("btn-" + type).classList.add('active-tab');

            if (type === "all") {
                renderCards(allIssues);
                return;
            }

            let result = [];

            for (let i = 0; i < allIssues.length; i++) {
                if (allIssues[i].status.toLowerCase() === type) {
                    result.push(allIssues[i]);
                }
            }

            renderCards(result);
        }

        // search (simple loop)
        function handleSearch() {
            let text = document.getElementById('search-input').value.toLowerCase();

            let result = [];

            for (let i = 0; i < allIssues.length; i++) {
                let t = allIssues[i].title.toLowerCase();
                let d = allIssues[i].description.toLowerCase();

                if (t.includes(text) || d.includes(text)) {
                    result.push(allIssues[i]);
                }
            }

            renderCards(result);
        }

        // modal open
        async function openModal(id) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');

            modal.classList.remove('hidden');
            modalContent.innerHTML = `<div class="p-20  text-center text-indigo-600 font-bold">Loading...</div>`;

            try {
                let res = await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issue/${id}`);
                let data = await res.json();

                let issue = data.data;
                let labelText = issue.status.toLowerCase() === 'open'
                    ? 'Opened by'
                    : 'Closed by';
                let statusColor = issue.status.toLowerCase() === 'open'
                    ? 'bg-[#10B981]'
                    : 'bg-[#8B5CF6]';

                let pClasses = "bg-[#EEEFF2]  text-[#9CA3AF] ";
                if (issue.priority.toLowerCase() === 'high') {
                    pClasses = 'bg-[#FEECEC]  text-[#EF4444]';
                } else if (issue.priority.toLowerCase() === 'medium') {
                    pClasses = 'bg-[#FFF6D1]  text-[#F59E0B]';
                }

                modalContent.innerHTML = `
            <div class="bg-white rounded-[32px] p-8  md:p-10 shadow-2xl border border-gray-100">
                 <h2 class="text-2xl font-extrabold text-[#1E293B] mb-3">${issue.title}</h2>
            <div class="flex flex-wrap  items-center gap-2 text-gray-400 text-sm mb-6">
                     <span class="${statusColor} text-white px-4 py-1 rounded-full text-[11px] font-bold uppercase ">${issue.status}</span>
                    <span>• ${labelText} <span class=" text-gray-600 font-semibold">${issue.author}</span></span>
                     <span>• 22/02/2026</span>
                 </div>
                <div class="flex gap-2 mb-6">
                    <img src="./assets/Bug_Labels.png"  class="h-6">
                     <img src="./assets/Help_Labels.png" class="h-6">
                </div>
                <p class="text-[#64748B] text-base leading-relaxed mb-8">${issue.description}</p>
                <div class="bg-[#F8FAFC] rounded-xl p-6 flex justify-between  items-center mb-8">
                    <div>
                        <p class="text-gray-400 text-xs  mb-1">Assignee</p>
                        <p class="text-[#1E293B] font-bold ">${issue.author}</p>
                       </div>
                    <div class="text-right">
                        <p class="text-gray-400 text-xs mb-1"> Priority</p>
                        <span class="${pClasses} px-4  py-1 rounded-lg text-[11px] font-black uppercase">${issue.priority}</span>
                      </div>
                </div>
                <div class="flex  justify-end">
                    <button onclick="closeModal()" class="bg-[#4A00FF] text-white py-3 px-8  rounded-xl">
                         Close
                     </button>
                  </div>
            </div>`;
            } catch (err) {
                modalContent.innerHTML = `<p class="p-10 text-center text-red-500">Failed to load data!</p>`;
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        fetchInitialData();
    </script>
</body>

</html>
